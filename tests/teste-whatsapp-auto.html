<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste WhatsApp Automático</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-btn {
            background: #25d366;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .test-btn:hover { background: #128c7e; }
    </style>
</head>
<body>
    <h1>🧪 Teste do WhatsApp Automático</h1>
    <p>Este teste simula o que acontece quando um cliente confirma um agendamento.</p>

    <button class="test-btn" onclick="testWhatsApp()">
        📱 Simular Confirmação de Agendamento
    </button>

    <p><strong>Nota:</strong> Substitua o número no código por um número real de WhatsApp para testar.</p>

    <script>
        function testWhatsApp() {
            // Simula os dados de um agendamento
            const appointments = [{
                clientName: "João Silva",
                clientPhone: "(11) 99999-9999",
                date: "2026-02-15",
                startMin: 840, // 14:00
                serviceName: "Corte de Cabelo + Barba",
                servicePrice: 50,
                barbershopName: "Barbearia Teste",
                barberName: "Carlos"
            }];

            const firstAppointment = appointments[0];
            const totalPrice = 50;
            const servicesList = "Corte de Cabelo + Barba";

            // Cria mensagem para WhatsApp
            const whatsappMessage = encodeURIComponent(
                `Olá ${firstAppointment.clientName}! 🎉\n\nSeu agendamento foi confirmado!\n\n📅 Data: ${new Date(firstAppointment.date + "T00:00:00").toLocaleDateString("pt-BR")}\n⏰ Horário: 14:00\n💇‍♂️ Serviços: ${servicesList}\n💰 Valor Total: R$ ${totalPrice},00\n🏪 Barbearia: ${firstAppointment.barbershopName}\n👨‍💼 Barbeiro: ${firstAppointment.barberName}\n\nObrigado por escolher nossos serviços!`
            );

            const whatsappUrl = `https://wa.me/55${firstAppointment.clientPhone.replace(/\D/g, "")}?text=${whatsappMessage}`;

            // Abre o WhatsApp automaticamente
            window.open(whatsappUrl, '_blank');

            alert('WhatsApp aberto automaticamente com a mensagem de confirmação!');
        }
    </script>
</body>
</html></content>
