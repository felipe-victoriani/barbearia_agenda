<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Agende seu horário na barbearia" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Barbearia" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Agendar Horário</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="../images/logo.png" />
    <link rel="apple-touch-icon" href="../images/logo.png" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a href="index.html" class="back-link">← Voltar</a>
        <h1 id="shop-name">Carregando...</h1>
      </header>

      <main class="main">
        <div id="loading" class="loading">
          <div class="spinner"></div>
          <p>Carregando informações...</p>
        </div>

        <div
          id="booking-container"
          class="booking-container"
          style="display: none"
        >
          <!-- Seleção de Serviço -->
          <section class="booking-section">
            <h2>1. Escolha o Serviço</h2>
            <div id="services-list" class="services-list"></div>
          </section>

          <!-- Seleção de Data -->
          <section class="booking-section">
            <h2>2. Escolha a Data</h2>
            <input type="date" id="date-picker" class="date-picker" />
          </section>

          <!-- Seleção de Barbeiro -->
          <section class="booking-section">
            <h2>3. Escolha o Barbeiro</h2>
            <div id="barbers-list" class="barbers-list"></div>
          </section>

          <!-- Seleção de Horário -->
          <section class="booking-section">
            <h2>4. Escolha o Horário</h2>
            <div id="slots-loading" class="loading-small" style="display: none">
              <div class="spinner-small"></div>
              <p>Carregando horários...</p>
            </div>
            <div id="slots-list" class="slots-list"></div>
          </section>

          <!-- Dados do Cliente -->
          <section class="booking-section">
            <h2>5. Seus Dados</h2>
            <form id="booking-form" class="booking-form">
              <div class="form-group">
                <label for="client-name">Nome Completo *</label>
                <input type="text" id="client-name" required />
              </div>
              <div class="form-group">
                <label for="client-phone">Telefone/WhatsApp *</label>
                <input
                  type="tel"
                  id="client-phone"
                  required
                  placeholder="(99) 99999-9999"
                />
              </div>
              <button
                type="submit"
                class="btn btn-primary"
                id="submit-btn"
                disabled
              >
                Confirmar Agendamento
              </button>
            </form>
          </section>
        </div>
      </main>

      <footer class="footer">
        <p>&copy; 2026 Sistema de Agendamento para Barbearias</p>
      </footer>
    </div>

    <script type="module">
      import { initShopPage } from "../js/appointments.js";

      // Inicializa a página de agendamento
      document.addEventListener("DOMContentLoaded", () => {
        initShopPage();

        // Registra Service Worker para PWA
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("sw.js").catch(console.log);
        }
      });
    </script>
  </body>
</html>
