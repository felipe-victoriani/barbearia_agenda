<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffd700" />
    <meta
      name="description"
      content="Painel administrativo do sistema de barbearias"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="images/logo.png" />
    <link rel="apple-touch-icon" href="images/logo.png" />
  </head>
  <body class="bg-black text-yellow-400">
    <div class="container">
      <!-- Tela de Login -->
      <div id="login-screen" class="admin-screen">
        <div
          class="bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl w-full max-w-sm p-8"
        >
          <h1 class="text-2xl font-bold text-yellow-400 text-center mb-8">
            🔐 Área Administrativa
          </h1>
          <form id="login-form" class="flex flex-col gap-5">
            <div class="flex flex-col gap-2">
              <label for="email" class="font-bold text-yellow-400 text-sm"
                >E-mail</label
              >
              <input
                type="email"
                id="email"
                required
                class="px-4 py-3 bg-black border-2 border-zinc-700 rounded-lg text-yellow-400 focus:outline-none focus:border-yellow-400 transition-colors"
              />
            </div>
            <div class="flex flex-col gap-2">
              <label for="password" class="font-bold text-yellow-400 text-sm"
                >Senha</label
              >
              <input
                type="password"
                id="password"
                required
                class="px-4 py-3 bg-black border-2 border-zinc-700 rounded-lg text-yellow-400 focus:outline-none focus:border-yellow-400 transition-colors"
              />
            </div>
            <button
              type="submit"
              class="py-3 bg-yellow-400 text-black font-bold rounded-xl hover:bg-yellow-300 transition-all"
            >
              Entrar
            </button>
            <div id="login-error" class="error-message"></div>
          </form>
          <a
            href="index.html"
            class="block text-center mt-6 text-yellow-600 hover:text-yellow-400 text-sm transition-colors"
          >
            ← Voltar ao início
          </a>
        </div>
      </div>

      <!-- Dashboard Admin -->
      <div id="admin-dashboard" class="admin-screen" style="display: none">
        <header class="admin-header">
          <div>
            <h1>Painel Administrativo</h1>
            <p id="user-info"></p>
          </div>
          <button
            id="logout-btn"
            class="px-4 py-2 bg-zinc-800 text-yellow-400 border border-zinc-600 rounded-lg hover:bg-zinc-700 hover:border-yellow-400 transition-all text-sm font-bold"
          >
            Sair
          </button>
        </header>

        <div class="admin-content">
          <!-- Menu Lateral -->
          <aside class="admin-sidebar">
            <nav class="admin-nav">
              <button class="nav-item active" data-section="agenda">
                📅 Agenda do Dia
              </button>
              <button
                class="nav-item"
                data-section="barbershops"
                id="nav-barbershops"
              >
                🏪 Barbearias
              </button>
              <button class="nav-item" data-section="services">
                ✂️ Serviços
              </button>
              <button class="nav-item" data-section="barbers">
                👨‍💼 Barbeiros
              </button>
              <button class="nav-item" data-section="availability">
                🕐 Horários
              </button>
              <button class="nav-item" data-section="financial">
                💰 Gestão Financeira
              </button>
            </nav>
          </aside>

          <!-- Conteúdo Principal -->
          <main class="admin-main">
            <!-- Seção: Agenda do Dia -->
            <section id="section-agenda" class="admin-section active">
              <div class="section-header">
                <h2>Agenda do Dia</h2>
                <div style="display: flex; gap: 15px; align-items: center">
                  <select
                    id="agenda-barbershop"
                    class="px-3 py-2 bg-black border border-zinc-600 rounded-lg text-yellow-400 focus:outline-none focus:border-yellow-400 text-sm"
                  >
                    <option value="">Todas as barbearias</option>
                  </select>
                  <input type="date" id="agenda-date" class="date-picker" />
                </div>
              </div>
              <div id="agenda-content" class="agenda-list"></div>
            </section>

            <!-- Seção: Barbearias (apenas MASTER) -->
            <section id="section-barbershops" class="admin-section">
              <div class="section-header">
                <h2>Gerenciar Barbearias</h2>
                <button class="btn btn-primary" id="add-barbershop-btn">
                  + Nova Barbearia
                </button>
              </div>
              <div id="barbershops-admin-list" class="admin-list"></div>
            </section>

            <!-- Seção: Serviços -->
            <section id="section-services" class="admin-section">
              <div class="section-header">
                <h2>Gerenciar Serviços</h2>
                <button class="btn btn-primary" id="add-service-btn">
                  + Novo Serviço
                </button>
              </div>
              <div id="services-admin-list" class="admin-list"></div>
            </section>

            <!-- Seção: Barbeiros -->
            <section id="section-barbers" class="admin-section">
              <div class="section-header">
                <h2>Gerenciar Barbeiros</h2>
                <button class="btn btn-primary" id="add-barber-btn">
                  + Novo Barbeiro
                </button>
              </div>
              <div id="barbers-admin-list" class="admin-list"></div>
            </section>

            <!-- Seção: Horários de Trabalho -->
            <section id="section-availability" class="admin-section">
              <div class="section-header">
                <h2>Horários de Trabalho</h2>
              </div>
              <div id="availability-content"></div>
            </section>

            <!-- Seção: Gestão Financeira -->
            <section id="section-financial" class="admin-section">
              <div class="section-header">
                <h2>Gestão Financeira</h2>
                <div style="display: flex; gap: 15px; align-items: center">
                  <select
                    id="financial-barbershop"
                    class="px-3 py-2 bg-black border border-zinc-600 rounded-lg text-yellow-400 focus:outline-none focus:border-yellow-400 text-sm"
                  >
                    <option value="">Todas as barbearias</option>
                  </select>
                  <select
                    id="financial-period"
                    class="px-3 py-2 bg-black border border-zinc-600 rounded-lg text-yellow-400 focus:outline-none focus:border-yellow-400 text-sm"
                  >
                    <option value="today">Hoje</option>
                    <option value="week">Esta Semana</option>
                    <option value="month" selected>Este Mês</option>
                    <option value="custom">Período Personalizado</option>
                  </select>
                  <div id="custom-dates" style="display: none; gap: 10px">
                    <input
                      type="date"
                      id="financial-start-date"
                      class="date-picker"
                      style="width: auto"
                    />
                    <input
                      type="date"
                      id="financial-end-date"
                      class="date-picker"
                      style="width: auto"
                    />
                  </div>
                </div>
              </div>
              <div id="financial-content" class="admin-list"></div>
            </section>
          </main>
        </div>
      </div>
    </div>

    <!-- Modal Genérico -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <span class="modal-close">&times;</span>
        <div id="modal-body"></div>
      </div>
    </div>

    <script type="module">
      import { initAdminPage } from "./js/admin.js";

      document.addEventListener("DOMContentLoaded", () => {
        initAdminPage();

        // Registra Service Worker para PWA
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("sw.js").catch(console.log);
        }
      });
    </script>
  </body>
</html>
